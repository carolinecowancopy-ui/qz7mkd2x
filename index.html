<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f6f5f2;
    --card: #ffffff;
    --ink: #1f2320;
    --muted: #6b7268;
    --accent: #4d6b58;
    --accent-soft: #dfe8e1;
    --accent2: #7a8f9c;
    --accent2-soft: #e2e8ea;
    --warn: #b5651d;
    --line: #e4e2dc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 20px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .updated { color: var(--muted); font-size: 13px; }
  .tabs { display: flex; gap: 8px; margin: 20px 0; border-bottom: 1px solid var(--line); }
  .tab {
    padding: 10px 16px;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  .panel { display: none; }
  .panel.active { display: block; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 14px;
  }
  .card h2 { font-size: 15px; margin: 0 0 10px; color: var(--ink); }
  .card h3 { font-size: 13px; margin: 14px 0 6px; color: var(--ink); }
  .metric-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .metric-label { font-size: 13px; color: var(--muted); }
  .metric-value { font-size: 14px; font-weight: 600; }
  .bar-track { background: var(--accent-soft); border-radius: 6px; height: 8px; overflow: hidden; margin-bottom: 12px; }
  .bar-fill { background: var(--accent); height: 100%; border-radius: 6px; }
  .plain-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  ul.plain { margin: 6px 0 0; padding-left: 18px; font-size: 13px; color: var(--ink); }
  ul.plain li { margin-bottom: 4px; }
  .empty { color: var(--muted); font-size: 13px; font-style: italic; }
  .caveat { color: var(--muted); font-size: 12px; margin-top: 10px; border-top: 1px solid var(--line); padding-top: 10px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge.normal { background: #dfe8e1; color: #2f5240; }
  .badge.watch { background: #f3e3d3; color: var(--warn); }
  .week-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .week-row:last-child { border-bottom: none; }
  .meal-block { margin-bottom: 14px; }
  .meal-block:last-child { margin-bottom: 0; }
  .meal-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .meal-summary { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  table.items { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.items th { text-align: left; color: var(--muted); font-weight: 600; padding: 4px 6px; border-bottom: 1px solid var(--line); }
  table.items td { padding: 4px 6px; border-bottom: 1px solid var(--line); }
  table.items td.num { text-align: right; white-space: nowrap; }
  .est-tag { color: var(--muted); font-size: 11px; }
  .chart-wrap { position: relative; height: 200px; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Health Dashboard</h1>
    <div class="updated" id="updated-line">Last updated: —</div>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="daily">Daily</div>
    <div class="tab" data-tab="weekly">Weekly</div>
    <div class="tab" data-tab="monthly">Monthly</div>
  </div>

  <div class="panel active" id="panel-daily"></div>
  <div class="panel" id="panel-weekly"></div>
  <div class="panel" id="panel-monthly"></div>
</div>

<script>
// This dashboard is a static snapshot. It's refreshed each time a daily,
// weekly, or monthly report runs (or whenever a manual refresh is asked
// for). It does not fetch anything live on its own when opened.
const DATA = {
  generatedAt: "2026-07-14T20:07:00",
  daily: {
    date: "14 July 2026",
    calories: { logged: 1690, target: 1800 },
    protein: { logged: 95, target: 100 },
    carbs: { logged: 204 },
    fat: { logged: 57 },
    meals: [
      {
        meal: "Breakfast",
        summary: "~485 kcal, ~40g protein, ~32g carbs, ~23g fat",
        items: [
          { item: "Protein coffee", quantity: "1 cup", kcal: 50, protein: 5, carbs: 2, fat: 2, estimated: true },
          { item: "Protein powder", quantity: "25g", kcal: 90, protein: 20, carbs: 3, fat: 1, estimated: false },
          { item: "Granola (pumpkin seeds, linseeds, rolled oats)", quantity: "1/4 cup", kcal: 130, protein: 3, carbs: 19, fat: 5, estimated: true },
          { item: "Full cream Greek yoghurt", quantity: "150g", kcal: 180, protein: 11, carbs: 7, fat: 12, estimated: false },
          { item: "Almond butter", quantity: "1 tsp", kcal: 35, protein: 1, carbs: 1, fat: 3, estimated: false }
        ]
      },
      {
        meal: "Lunch",
        summary: "~410 kcal, ~19g protein, ~68g carbs, ~7g fat",
        items: [
          { item: "Jasmine rice", quantity: "1 cup", kcal: 205, protein: 4, carbs: 45, fat: 0, estimated: false },
          { item: "Sticky tofu", quantity: "75g", kcal: 110, protein: 11, carbs: 6, fat: 5, estimated: false },
          { item: "Sticky sesame ginger sauce", quantity: "2 tbsp", kcal: 60, protein: 1, carbs: 10, fat: 2, estimated: true },
          { item: "Steamed broccoli", quantity: "1 side portion", kcal: 35, protein: 3, carbs: 7, fat: 0, estimated: true }
        ]
      },
      {
        meal: "Snack",
        summary: "~80 kcal, ~1g protein, ~20g carbs, ~0g fat",
        items: [
          { item: "Tangerines", quantity: "2 small", kcal: 80, protein: 1, carbs: 20, fat: 0, estimated: false }
        ]
      },
      {
        meal: "Dinner",
        summary: "~715 kcal, ~35g protein, ~84g carbs, ~27g fat",
        items: [
          { item: "Instant noodles (no flavour packet)", quantity: "1 packet", kcal: 380, protein: 8, carbs: 52, fat: 15, estimated: false },
          { item: "Tofu", quantity: "150g", kcal: 150, protein: 17, carbs: 4, fat: 9, estimated: false },
          { item: "Vegetable and split pea soup", quantity: "1 cup", kcal: 170, protein: 9, carbs: 28, fat: 2, estimated: false },
          { item: "Cheddar cheese", quantity: "1 tsp sprinkle", kcal: 15, protein: 1, carbs: 0, fat: 1, estimated: true }
        ]
      }
    ],
    exercise: [
      "Upper-body heavy lifting: biceps curls, shoulder lifts, chest presses, side arm raises, tricep overhead lifts — ~40 min, vigorous"
    ],
    bp: null
  },
  weekly: {
    range: "8–14 July 2026",
    daysLogged: 3,
    daysInWindow: 7,
    avgCalories: 1779,
    avgProtein: 93,
    sprintSessions: { logged: 0, target: 2 },
    liftSessions: { logged: 2, target: 3 },
    bpAvg: null,
    working: "Two heavy lifting sessions logged this week (lower body on the 12th, upper body on the 14th), on pace for the 3x/week target. Protein's averaging close to the 100g floor across logged days.",
    improve: "No sprint interval sessions yet this week, and no BP readings logged at all so far.",
    suggestions: "Fit in a sprint session before the week's out. Log a BP reading, even just once, to get a baseline against the categories in targets.md.",
    trend: {
      days: ["8 Jul", "9 Jul", "10 Jul", "11 Jul", "12 Jul", "13 Jul", "14 Jul"],
      calories: [null, null, null, null, 1525, 2122, 1690],
      protein: [null, null, null, null, 84, 100, 95]
    },
    days: [
      { date: "8 Jul", calories: null, protein: null, exercise: [], bp: null },
      { date: "9 Jul", calories: null, protein: null, exercise: [], bp: null },
      { date: "10 Jul", calories: null, protein: null, exercise: [], bp: null },
      { date: "11 Jul", calories: null, protein: null, exercise: [], bp: null },
      { date: "12 Jul", calories: 1525, protein: 84, exercise: ["Lower-body heavy lifting"], bp: null },
      { date: "13 Jul", calories: 2122, protein: 100, exercise: [], bp: null },
      { date: "14 Jul", calories: 1690, protein: 95, exercise: ["Upper-body heavy lifting"], bp: null }
    ],
    previousWeek: {
      range: "1–7 July 2026",
      avgCalories: null,
      avgProtein: null,
      sprintSessions: { logged: 0, target: 2 },
      liftSessions: { logged: 0, target: 3 },
      bpAvg: null,
      daysLogged: 0
    }
  },
  monthly: {
    month: "July 2026",
    weeks: [
      { label: "Week of 6 July", daysLogged: 1, avgCalories: 1525, avgProtein: 84, exercise: 1, bp: "—" },
      { label: "Week of 13 July", daysLogged: 2, avgCalories: 1906, avgProtein: 98, exercise: 1, bp: "—" }
    ],
    working: "Logging is becoming a daily habit (3 of the last 3 days have full meal entries), and both lifting sessions so far this month were logged.",
    improve: "No BP readings logged at all this month, and no sprint intervals either.",
    suggestions: "Once a full month is logged, this view will show whether protein and BP are trending the right way over time, not just day to day.",
    history: [
      { month: "Feb 2026", daysLogged: 0, avgCalories: null, avgProtein: null, liftSessions: 0, sprintSessions: 0, bpAvg: null },
      { month: "Mar 2026", daysLogged: 0, avgCalories: null, avgProtein: null, liftSessions: 0, sprintSessions: 0, bpAvg: null },
      { month: "Apr 2026", daysLogged: 0, avgCalories: null, avgProtein: null, liftSessions: 0, sprintSessions: 0, bpAvg: null },
      { month: "May 2026", daysLogged: 0, avgCalories: null, avgProtein: null, liftSessions: 0, sprintSessions: 0, bpAvg: null },
      { month: "Jun 2026", daysLogged: 0, avgCalories: null, avgProtein: null, liftSessions: 0, sprintSessions: 0, bpAvg: null },
      { month: "Jul 2026", daysLogged: 3, avgCalories: 1779, avgProtein: 93, liftSessions: 2, sprintSessions: 0, bpAvg: null }
    ]
  }
};

function bar(logged, target) {
  const pct = Math.min(100, Math.round((logged / target) * 100));
  return `<div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>`;
}

function itemsTable(items) {
  const rows = items.map(it => `
    <tr>
      <td>${it.item}${it.estimated ? ' <span class="est-tag">(est.)</span>' : ''}</td>
      <td class="num">${it.quantity}</td>
      <td class="num">${it.kcal}</td>
      <td class="num">${it.protein}g</td>
      <td class="num">${it.carbs}g</td>
      <td class="num">${it.fat}g</td>
    </tr>
  `).join('');
  return `
    <table class="items">
      <thead><tr><th>Item</th><th class="num">Qty</th><th class="num">kcal</th><th class="num">Protein</th><th class="num">Carbs</th><th class="num">Fat</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function renderDaily(d) {
  const mealBlocks = d.meals.length
    ? d.meals.map(m => `
        <div class="meal-block">
          <div class="meal-name">${m.meal}</div>
          <div class="meal-summary">${m.summary}</div>
          ${itemsTable(m.items)}
        </div>
      `).join('')
    : `<p class="empty">Nothing logged yet today.</p>`;
  const exerciseList = d.exercise.length
    ? `<ul class="plain">${d.exercise.map(e => `<li>${e}</li>`).join('')}</ul>`
    : `<p class="empty">No exercise logged today.</p>`;
  const bpBlock = d.bp
    ? `<div class="metric-row"><span class="metric-label">Reading</span><span class="metric-value">${d.bp.systolic}/${d.bp.diastolic}, pulse ${d.bp.pulse}</span></div>`
    : `<p class="empty">No BP reading logged today.</p>`;

  return `
    <div class="card">
      <h2>${d.date} — Nutrition</h2>
      <div class="metric-row"><span class="metric-label">Calories</span><span class="metric-value">${d.calories.logged} / ${d.calories.target} kcal</span></div>
      ${bar(d.calories.logged, d.calories.target)}
      <div class="metric-row"><span class="metric-label">Protein</span><span class="metric-value">${d.protein.logged} / ${d.protein.target} g</span></div>
      ${bar(d.protein.logged, d.protein.target)}
      <div class="plain-row"><span>Carbs</span><span>${d.carbs.logged} g</span></div>
      <div class="plain-row"><span>Fat</span><span>${d.fat.logged} g</span></div>
      <h3>By meal</h3>
      ${mealBlocks}
    </div>
    <div class="card">
      <h2>Exercise</h2>
      ${exerciseList}
    </div>
    <div class="card">
      <h2>Blood pressure</h2>
      ${bpBlock}
    </div>
    <div class="caveat">Nutrition numbers, including per-item figures, are estimates from food descriptions, not database-accurate.</div>
  `;
}

function dayRows(days) {
  return days.map(d => `
    <tr>
      <td>${d.date}</td>
      <td class="num">${d.calories != null ? d.calories : '—'}</td>
      <td class="num">${d.protein != null ? d.protein + 'g' : '—'}</td>
      <td>${d.exercise.length ? d.exercise.join(', ') : '—'}</td>
      <td>${d.bp ? `${d.bp.systolic}/${d.bp.diastolic}` : '—'}</td>
    </tr>
  `).join('');
}

function renderWeekly(w) {
  const prev = w.previousWeek;
  return `
    <div class="card">
      <h2>${w.range} — Nutrition</h2>
      <div class="metric-row"><span class="metric-label">Days logged</span><span class="metric-value">${w.daysLogged} of ${w.daysInWindow}</span></div>
      <div class="metric-row"><span class="metric-label">Avg calories (logged days)</span><span class="metric-value">${w.avgCalories} kcal</span></div>
      <div class="metric-row"><span class="metric-label">Avg protein (logged days)</span><span class="metric-value">${w.avgProtein} g</span></div>
      <h3>Last 7 days</h3>
      <div class="chart-wrap"><canvas id="trend-chart"></canvas></div>
    </div>
    <div class="card">
      <h2>Day by day</h2>
      <table class="items">
        <thead><tr><th>Day</th><th class="num">kcal</th><th class="num">Protein</th><th>Exercise</th><th>BP</th></tr></thead>
        <tbody>${dayRows(w.days)}</tbody>
      </table>
    </div>
    <div class="card">
      <h2>Exercise</h2>
      <div class="metric-row"><span class="metric-label">Sprint sessions</span><span class="metric-value">${w.sprintSessions.logged} / ${w.sprintSessions.target}</span></div>
      <div class="metric-row"><span class="metric-label">Lifting sessions</span><span class="metric-value">${w.liftSessions.logged} / ${w.liftSessions.target}</span></div>
    </div>
    <div class="card">
      <h2>Blood pressure</h2>
      ${w.bpAvg ? `<div class="metric-row"><span class="metric-label">Average</span><span class="metric-value">${w.bpAvg}</span></div>` : `<p class="empty">No readings logged this week.</p>`}
    </div>
    <div class="card">
      <h2>Compared to last week (${prev.range})</h2>
      <table class="items">
        <thead><tr><th>Metric</th><th class="num">This week</th><th class="num">Last week</th></tr></thead>
        <tbody>
          <tr><td>Avg calories</td><td class="num">${w.avgCalories != null ? w.avgCalories : '—'}</td><td class="num">${prev.avgCalories != null ? prev.avgCalories : '—'}</td></tr>
          <tr><td>Avg protein</td><td class="num">${w.avgProtein != null ? w.avgProtein + 'g' : '—'}</td><td class="num">${prev.avgProtein != null ? prev.avgProtein + 'g' : '—'}</td></tr>
          <tr><td>Sprint sessions</td><td class="num">${w.sprintSessions.logged}</td><td class="num">${prev.sprintSessions.logged}</td></tr>
          <tr><td>Lifting sessions</td><td class="num">${w.liftSessions.logged}</td><td class="num">${prev.liftSessions.logged}</td></tr>
          <tr><td>BP avg</td><td class="num">${w.bpAvg || '—'}</td><td class="num">${prev.bpAvg || '—'}</td></tr>
        </tbody>
      </table>
    </div>
    <div class="card">
      <h2>What's working</h2><p>${w.working}</p>
      <h2>What needs improvement</h2><p>${w.improve}</p>
      <h2>Suggestions</h2><p>${w.suggestions}</p>
    </div>
  `;
}

function renderMonthly(m) {
  const weekRows = m.weeks.map(w => `
    <div class="week-row">
      <span>${w.label}</span>
      <span>${w.daysLogged}d logged · ${w.avgCalories} kcal · ${w.avgProtein}g protein · ${w.exercise} exercise · BP ${w.bp}</span>
    </div>
  `).join('');

  const historyRows = (m.history || []).map(h => `
    <tr>
      <td>${h.month}</td>
      <td class="num">${h.daysLogged}</td>
      <td class="num">${h.avgCalories != null ? h.avgCalories : '—'}</td>
      <td class="num">${h.avgProtein != null ? h.avgProtein + 'g' : '—'}</td>
      <td class="num">${h.liftSessions}</td>
      <td class="num">${h.sprintSessions}</td>
      <td class="num">${h.bpAvg || '—'}</td>
    </tr>
  `).join('');

  return `
    <div class="card">
      <h2>${m.month} — Week by week</h2>
      ${weekRows}
    </div>
    <div class="card">
      <h2>What's working</h2><p>${m.working}</p>
      <h2>What needs improvement</h2><p>${m.improve}</p>
      <h2>Suggestions</h2><p>${m.suggestions}</p>
    </div>
    <div class="card">
      <h2>Last 6 months</h2>
      <div class="chart-wrap"><canvas id="history-chart"></canvas></div>
      <table class="items" style="margin-top:12px">
        <thead><tr><th>Month</th><th class="num">Days</th><th class="num">Avg kcal</th><th class="num">Avg protein</th><th class="num">Lifts</th><th class="num">Sprints</th><th class="num">BP avg</th></tr></thead>
        <tbody>${historyRows}</tbody>
      </table>
    </div>
  `;
}

let trendChart = null;
function renderTrendChart(trend) {
  const ctx = document.getElementById('trend-chart');
  if (!ctx || typeof Chart === 'undefined') return;
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: trend.days,
      datasets: [
        {
          label: 'Calories',
          data: trend.calories,
          borderColor: '#4d6b58',
          backgroundColor: '#4d6b58',
          spanGaps: true,
          tension: 0.25,
          yAxisID: 'y'
        },
        {
          label: 'Protein (g)',
          data: trend.protein,
          borderColor: '#7a8f9c',
          backgroundColor: '#7a8f9c',
          spanGaps: true,
          tension: 0.25,
          yAxisID: 'y1'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        y: { position: 'left', title: { display: true, text: 'kcal' } },
        y1: { position: 'right', title: { display: true, text: 'protein (g)' }, grid: { drawOnChartArea: false } }
      },
      plugins: { legend: { position: 'bottom' } }
    }
  });
}

let historyChart = null;
function renderHistoryChart(history) {
  const ctx = document.getElementById('history-chart');
  if (!ctx || typeof Chart === 'undefined' || !history) return;
  if (historyChart) historyChart.destroy();
  historyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: history.map(h => h.month),
      datasets: [
        {
          label: 'Avg calories',
          data: history.map(h => h.avgCalories),
          backgroundColor: '#4d6b58',
          yAxisID: 'y'
        },
        {
          label: 'Avg protein (g)',
          data: history.map(h => h.avgProtein),
          backgroundColor: '#7a8f9c',
          yAxisID: 'y1'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { position: 'left', title: { display: true, text: 'kcal' } },
        y1: { position: 'right', title: { display: true, text: 'protein (g)' }, grid: { drawOnChartArea: false } }
      },
      plugins: { legend: { position: 'bottom' } }
    }
  });
}

document.getElementById('panel-daily').innerHTML = renderDaily(DATA.daily);
document.getElementById('panel-weekly').innerHTML = renderWeekly(DATA.weekly);
document.getElementById('panel-monthly').innerHTML = renderMonthly(DATA.monthly);
document.getElementById('updated-line').textContent = 'Last updated: ' + new Date(DATA.generatedAt).toLocaleString();
renderTrendChart(DATA.weekly.trend);

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    // Chart.js needs a redraw when its canvas becomes visible again
    if (tab.dataset.tab === 'weekly') renderTrendChart(DATA.weekly.trend);
    if (tab.dataset.tab === 'monthly') renderHistoryChart(DATA.monthly.history);
  });
});
</script>
</body>
</html>
